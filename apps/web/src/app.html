<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
		<!-- Apply dark class before first paint to prevent flash of unstyled content -->
		<script>
			(function () {
				try {
					var pref = localStorage.getItem('spotify_theme_preference');
					var dark = pref === 'dark' || (!pref && window.matchMedia('(prefers-color-scheme: dark)').matches);
					if (dark) document.documentElement.classList.add('dark');
				} catch (e) {}
			})();
		</script>
		%sveltekit.head%
	</head>
	<body data-sveltekit-prerender="false">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
